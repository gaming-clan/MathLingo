<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden pb-24">
<!-- TopAppBar -->
<header class="flex justify-between items-center w-full px-6 py-4 sticky top-0 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-white/10 shadow-none">
<div class="flex items-center gap-3">

</div>
</div>
<div class="text-2xl font-black text-purple-500 tracking-tighter font-['Space_Grotesk'] font-bold">MathLingo</div>
<button type="button" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-margin-mobile pt-6 flex flex-col gap-stack-lg">
<!-- Lesson Header -->
<section class="flex flex-col gap-stack-sm">
<span class="font-label-lg text-label-lg text-secondary-container tracking-wider uppercase">Algjebra Bazë</span>
<h1 class="font-headline-lg text-headline-lg text-on-background">Zgjidh ekuacionin</h1>
</section>
<!-- Centerpiece Equation Card (Glassmorphism + 3D Character) -->
<section class="relative w-full h-[320px] rounded-[2rem] glass-card shadow-[0_8px_32px_rgba(188,19,254,0.15)] flex flex-col items-center justify-center overflow-hidden">
<!-- Glow effect behind equation -->
<div class="absolute inset-0 flex items-center justify-center opacity-30 pointer-events-none">
<div class="w-48 h-48 bg-primary rounded-full blur-[80px]"></div>
</div>
<!-- Mathematical Equation -->
<div class="z-10 font-headline-lg text-[48px] leading-tight text-white font-bold tracking-wider drop-shadow-lg mb-8">
<span class="text-secondary-container">√</span>x² + y²
            </div>
<!-- 3D AI Tutor Character -->
<div class="absolute bottom-[-10px] right-[-20px] w-[200px] h-[200px] z-20 pointer-events-none">
<img alt="MathLingo Stitch AI tutor app icon" class="w-full h-full object-contain p-5 drop-shadow-[0_0_28px_rgba(188,19,254,0.38)] mascot-mask" data-alt="Local MathLingo Stitch AI tutor app icon used as the lesson mascot across all app screen sizes." src="../../../assets/icons/stich_icon.png">
</div>
</section>
<!-- Interactive Math Tools/Hints -->
<section class="flex flex-col gap-stack-md mt-4">
<h2 class="font-label-lg text-label-lg text-on-surface-variant ml-2">Mjetet e Llogaritjes</h2>
<div class="flex justify-between items-center px-2">
<!-- Tool Button 1 -->
<button type="button" class="w-14 h-14 rounded-full bg-surface-container-high/60 backdrop-blur-md border border-outline-variant flex items-center justify-center text-primary-fixed hover:bg-surface-container-highest transition-colors shadow-[0_4px_12px_rgba(0,0,0,0.5)] active:scale-95">
<span class="font-headline-md text-headline-md">√x</span>
</button>
<!-- Tool Button 2 -->
<button type="button" class="w-14 h-14 rounded-full bg-surface-container-high/60 backdrop-blur-md border border-outline-variant flex items-center justify-center text-secondary-container hover:bg-surface-container-highest transition-colors shadow-[0_4px_12px_rgba(0,0,0,0.5)] active:scale-95">
<span class="font-headline-md text-headline-md">π</span>
</button>
<!-- Tool Button 3 -->
<button type="button" class="w-14 h-14 rounded-full bg-surface-container-high/60 backdrop-blur-md border border-outline-variant flex items-center justify-center text-primary-fixed hover:bg-surface-container-highest transition-colors shadow-[0_4px_12px_rgba(0,0,0,0.5)] active:scale-95">
<span class="font-headline-md text-headline-md">x²</span>
</button>
<!-- Tool Hint (Distinct styling) -->
